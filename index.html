<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Pendataan Sholat Siswa/Siswi</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <h2>Pendataan Sholat</h2>
        <p>Siswa/Siswi</p>
      </div>

      <div class="card">
        <input
          type="text"
          id="nama"
          class="nama-input"
          placeholder="Nama Siswa/Siswi"
        />

        <select id="sholat">
          <option>Subuh</option>
          <option>Dzuhur</option>
          <option>Ashar</option>
          <option>Maghrib</option>
          <option>Isya</option>
        </select>

        <select id="status">
          <option value="sholat">Sholat</option>
          <option value="tidak">Tidak</option>
          <option value="haid">Haid</option>
        </select>

        <button onclick="tambahData()">Tambah Data</button>
      </div>

      <input
        class="search"
        type="text"
        id="search"
        placeholder="Cari nama..."
        onkeyup="searchData()"
      />

      <div class="rekap">
        <div class="box sholat-box">
          <p>Sholat</p>
          <h3 id="sholatCount"></h3>
        </div>
        <div class="box tidak-box">
          <p>Tidak</p>
          <h3 id="tidakCount"></h3>
        </div>
        <div class="box haid-box">
          <p>Haid</p>
          <h3 id="haidCount"></h3>
        </div>
      </div>

      <ul id="list"></ul>

      <button class="hapus" onclick="hapusSemua()">Hapus Semua</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="script.js"></script>
  </body>
</html>
